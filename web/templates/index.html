{% extends "base.html" %}
{% block title %}처리 — PDF 보안 처리{% endblock %}
{% block content %}
<section class="card">
  <h2>PDF 보안 처리</h2>
  <form id="job-form" class="form" enctype="multipart/form-data">
    <label>원본 PDF
      <input type="file" name="file" accept="application/pdf,.pdf" required>
    </label>
    <label>구매자 이름
      <input type="text" name="buyer_name" id="buyer_name" required>
    </label>
    <label>연락처
      <input type="text" name="buyer_phone" id="buyer_phone" required>
    </label>
    <label>PDF 비밀번호
      <input type="text" name="pdf_password" id="pdf_password" required
             pattern="[ -~]+" title="영문, 숫자, 기본 특수문자만 사용 가능 (한글 불가)"
             autocomplete="new-password">
      <span class="hint">영문·숫자·기본 특수문자만 사용하세요. 한글은 PDF에서 열리지 않을 수 있습니다.</span>
    </label>
    <label>워터마크 시작 페이지
      <input type="number" name="watermark_start_page" min="1" value="{{ default_watermark_start_page }}" required>
    </label>
    <div class="preview">
      <strong>미리보기</strong>
      <p id="watermark-preview" class="hint">이름과 연락처를 입력하세요.</p>
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">처리 시작</button>
    <p id="form-error" class="error" hidden></p>
  </form>
</section>
<script src="/static/app.js?v=2"></script>
{% endblock %}
